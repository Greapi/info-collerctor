<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026-04-12 RSS 日报 - RSS 日报</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.75 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 3px; }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .bar, main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }
    .brand {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }
    main { padding: 34px 0 56px; }
    h1, h2, h3 { line-height: 1.3; letter-spacing: 0; }
    h1 { margin: 0 0 20px; font-size: clamp(28px, 5vw, 42px); }
    h2 { margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); }
    p, li { color: #263244; }
    code { background: var(--accent-soft); padding: 2px 5px; border-radius: 4px; }
    .meta { color: var(--muted); margin-top: -8px; }
    .reports { display: grid; gap: 14px; margin-top: 24px; }
    .report-card {
      display: block;
      padding: 18px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
    }
    .report-card:hover { border-color: var(--accent); }
    .report-card strong { display: block; font-size: 18px; }
    .report-card span { display: block; margin-top: 6px; color: var(--muted); }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(20px, 4vw, 42px);
    }
    article h1:first-child { margin-top: 0; }
    @media (max-width: 640px) {
      .bar { align-items: flex-start; flex-direction: column; }
      main { padding-top: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="../index.html">RSS 日报</a>
      <span>GitHub Pages</span>
    </div>
  </header>
  <main>
    <article>
      <h1>2026-04-12 RSS 日报</h1>
      <p>今天没有找到可分析的 RSS Markdown。</p>
      <p>检查路径：<code>rss-downloads</code></p>
    </article>
  </main>
</body>
</html>
